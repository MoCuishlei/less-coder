name: CI

on:
  push:
  pull_request:

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Java (for mvn test)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run integration tests (fast layer)
        run: |
          pytest -q -s tests/integration \
            -k "not real_e2e" | tee ci-integration-fast.log

      - name: Run integration tests (real e2e layer)
        run: |
          pytest -q -s tests/integration \
            -k "real_e2e" | tee ci-integration-e2e.log

      - name: Upload integration log artifact
        uses: actions/upload-artifact@v4
        with:
          name: ci-integration-log
          path: |
            ci-integration-fast.log
            ci-integration-e2e.log
