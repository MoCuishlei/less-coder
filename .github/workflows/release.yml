name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_registry:
        description: "Publish to PyPI/npm (requires secrets)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run integration tests
        run: |
          pytest -q tests/integration

  build-python:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Python distributions
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build

      - name: Upload python dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  build-npm:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Pack npm tarball
        run: |
          npm pack

      - name: Upload npm tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-tarball
          path: "*.tgz"

  build-rust-adapter:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: alsp-adapter-linux
            binary_path: engine/rust/alsp_adapter/target/release/alsp_adapter
            output_name: alsp_adapter_linux_x86_64
          - os: windows-latest
            artifact_name: alsp-adapter-windows
            binary_path: engine/rust/alsp_adapter/target/release/alsp_adapter.exe
            output_name: alsp_adapter_windows_x86_64.exe
          - os: macos-latest
            artifact_name: alsp-adapter-macos
            binary_path: engine/rust/alsp_adapter/target/release/alsp_adapter
            output_name: alsp_adapter_macos_x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: |
          cargo build --release --manifest-path engine/rust/alsp_adapter/Cargo.toml --bin alsp_adapter

      - name: Prepare adapter asset (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p release-assets
          cp "${{ matrix.binary_path }}" "release-assets/${{ matrix.output_name }}"
          sha256sum "release-assets/${{ matrix.output_name }}" > "release-assets/${{ matrix.output_name }}.sha256"

      - name: Prepare adapter asset (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          Copy-Item "${{ matrix.binary_path }}" "release-assets/${{ matrix.output_name }}"
          $hash = (Get-FileHash "release-assets/${{ matrix.output_name }}" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.output_name }}" | Out-File -FilePath "release-assets/${{ matrix.output_name }}.sha256" -Encoding ascii

      - name: Upload adapter artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release-assets/*

  github-release:
    needs:
      - build-python
      - build-npm
      - build-rust-adapter
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Generate adapter manifest
        run: |
          python - <<'PY'
          import hashlib, json
          from pathlib import Path

          root = Path("release-assets")
          targets = {
              "alsp_adapter_windows_x86_64.exe",
              "alsp_adapter_linux_x86_64",
              "alsp_adapter_macos_x86_64",
          }
          assets = []
          for p in root.rglob("*"):
              if not p.is_file():
                  continue
              if p.name not in targets:
                  continue
              h = hashlib.sha256()
              with p.open("rb") as f:
                  while True:
                      b = f.read(8192)
                      if not b:
                          break
                      h.update(b)
              assets.append({
                  "name": p.name,
                  "sha256": h.hexdigest(),
                  "size": p.stat().st_size,
              })
          manifest = {
              "version": 1,
              "assets": sorted(assets, key=lambda x: x["name"]),
          }
          out = root / "lesscoder_adapter_manifest.json"
          out.write_text(json.dumps(manifest, indent=2), encoding="utf-8")
          print(out)
          PY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/**/*
          generate_release_notes: true

  publish-pypi:
    needs: build-python
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_registry == 'true')
    runs-on: ubuntu-latest
    environment:
      name: pypi
    env:
      HAS_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN != '' }}
    steps:
      - name: Download python dist artifact
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Publish to PyPI
        if: ${{ env.HAS_PYPI_TOKEN == 'true' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Skip PyPI publish (missing secret)
        if: ${{ env.HAS_PYPI_TOKEN != 'true' }}
        run: echo "PYPI_API_TOKEN not configured; skipping PyPI publish."

  publish-npm:
    needs: build-npm
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_registry == 'true')
    runs-on: ubuntu-latest
    env:
      HAS_NPM_TOKEN: ${{ secrets.NPM_TOKEN != '' }}
    steps:
      - name: Download npm artifact
        uses: actions/download-artifact@v4
        with:
          name: npm-tarball
          path: npm-dist

      - name: Setup Node for npm publish
        if: ${{ env.HAS_NPM_TOKEN == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Publish to npm
        if: ${{ env.HAS_NPM_TOKEN == 'true' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          TARBALL=$(ls ./npm-dist/*.tgz | head -n 1)
          if [ -z "$TARBALL" ]; then
            echo "No npm tarball found under ./npm-dist"
            exit 1
          fi
          npm publish "$TARBALL" --access public

      - name: Skip npm publish (missing secret)
        if: ${{ env.HAS_NPM_TOKEN != 'true' }}
        run: echo "NPM_TOKEN not configured; skipping npm publish."
